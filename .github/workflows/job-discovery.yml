name: Daily Job Discovery

# Runs where there IS real internet (GitHub-hosted runner), unlike the Claude Code
# sandbox. Fetches fresh fuel-cell postings from the company ATS APIs (+ keyless
# aggregators), keeps only the last `max_age_days`, validates that every apply link is
# live, then commits a report + a self-contained static dashboard you can open from the
# repo. LLM scoring/tailoring is done later by the agent (Claude/OpenClaw) on this data.

on:
  schedule:
    - cron: "0 6 * * *"      # 06:00 UTC daily
  workflow_dispatch:           # allow manual "Run workflow"
    inputs:
      max_age_days:
        description: "Freshness window in days (blank = use config.yml default of 3)"
        required: false
        default: ""

permissions:
  contents: write              # to commit the report + dashboard back

concurrency:
  group: job-discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      # Add this in GitHub: Settings -> Secrets and variables -> Actions -> New repository
      # secret named RAPIDAPI_KEY (your free JSearch key). Without it, JSearch is skipped.
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      # Free Adzuna keys (developer.adzuna.com) — add as repo secrets to switch Adzuna on.
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      # Diagnostic override for the freshness window; blank on the daily cron.
      JOBAUTO_MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days }}
    defaults:
      run:
        working-directory: "Job automation/skill"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify source tokens (reachability + validity)
        run: python -m jobauto check-sources || true

      - name: Fetch fresh postings (ATS APIs + keyless aggregators)
        run: python -m jobauto fetch || true

      - name: Drop dead / expired links (+ verify real posting dates)
        run: python -m jobauto validate-links --reject-dead || true

      - name: Tag new-vs-seen postings (persistent across runs)
        run: python -m jobauto mark-seen || true

      - name: Build report + raw discovery dashboard
        run: |
          # The CURATED dashboard.html (LLM scores + tailored docs) is produced by the agent
          # in a Claude/OpenClaw session and must NOT be clobbered by this keyless run.
          # The cron only refreshes the raw discovery feed + the daily jobs snapshot.
          python -m jobauto report || true
          python -m jobauto dashboard --out "../dashboard/auto_latest.html" || true
          python -m jobauto dump-jobs --out "../dashboard/latest_jobs.json" || true
          cp ../output/source_check.json ../dashboard/source_check.json 2>/dev/null || true

      - name: Commit results back to the repo
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "job-automation-bot"
          git config user.email "job-automation-bot@users.noreply.github.com"
          git add "Job automation/reports" "Job automation/dashboard/auto_latest.html" "Job automation/dashboard/latest_jobs.json" "Job automation/dashboard/seen.json" "Job automation/dashboard/source_check.json" || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily job discovery: $(date -u +%F)"
            git push
          fi

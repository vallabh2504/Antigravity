ngs are for 2nd shift and 3rd shift.\nJob Responsibilities: \nOperate and monitor various production machines for manufacturing and re-manufacturing diesel fuel components. \nPerform final assembly, part sorting, tear-down, washing, and other tasks according to process control documentation.\nRecord daily production data and complete on-line Statistical Process Control charting to monitor process variation.\nConduct basic maintenance, troubleshoot minor issues, and ensure equipment functionality.\nFollow safety protocols and maintain a clean, organized workspace.\nSupport production goals by completing additional tasks as directed by management.\n\nQualifications\nHigh school diploma or GED\nBasic math, reading, and computer skills\nAvailable to work 2nd and 3rd shift hours \n1+ years of hands-on experience in a manufacturing environment.\nDetail-oriented with a commitment to excellence.\nProficient in reading, writing, and verbal communication in English to ensure seamless collaboration and comprehension of instructions.\nLift up to 35 lbs., up to 20 times/hour.\nAvailable to work overtime as needed (including Saturdays)\n\nIndefinite U.S. work authorized individuals only.  Future sponsorship for work authorization unavailable. \nHourly Compensation: The U.S. base hourly wage for this full-time position is $23.15/hr with an additional $1.00 shift premium based on the assigned shift.\nIn addition to your base compensation, Bosch offers a comprehensive benefits package that includes health, dental, and vision plans; health savings accounts (HSA); flexible spending accounts; 401(K) retirement plans with an employer match; wellness programs; life insurance; short- and long-term disability insurance; paid time off; parental leave, adoption assistance; and reimbursement of education expenses.\nLearn more about our full benefits offerings by visiting: www.myboschbenefits.com. Pay ranges included in the postings generally reflect base salary; certain positions may include bonus, commission, or additional benefits.\nEqual Opportunity Employer, including disability / veterans.\nPlease note that employment is contingent upon the successful completion of a drug screen and background check. Candidates who have been offered the position must pass both screenings before their start date.", "resume_html": "", "cover_html": ""}, {"id": "2811a4dc1a2a59ba", "company": "Bosch", "title": "Graduate Specialist Program - Manufacturing Engineering", "location": "Birmingham, gb", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000128220480-graduate-specialist-program-manufacturing-engineering?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-05-25T12:52:44.427Z", "age_days": 17, "jd": "HydraForce, operating from our purpose-built facility in Birmingham, UK, is a global designer and manufacturer of motion control systems and the world’s leading manufacturer of hydraulic cartridge valves and custom hydraulic integrated circuits, as well as electronic controls for a variety of off-highway industries\n\nBosch Rexroth and HydraForce bring together two world-class leaders in hydraulic motion control. By combining our strengths, we've broadened our hydraulics offering to deliver the world's highest quality hydraulic control solutions to more OEMs across the globe. Together, we are expanding the possibilities of hydraulic control technology to provide innovative and reliable solutions.\nOur trainee program as a \"Graduate Specialist Program - Manufacturing Engineering\" is your career start in an internationally successful company. In 18-24 months, you will pass through specialist departments in our plant in Birmingham and abroad that are individually tailored to you.  In the Graduate Specialist Program (GSP), you are in good hands as a technical ace with a soft spot for manufacturing and hydraulics technology. You carry an innovative mindset working towards effective solutions and embrace influencing people.\nYou will benefit from the comprehensive support of an experienced mentor and experts from specialist departments - through regular feedback.\n\nYou will build up an extensive network within the company, from which you will benefit in the long term and align individual priorities within the program - and thus dynamically shape your future\nWe are looking for a talented post Masters graduate, who had a passion for manufacturing!\nYou will acquire an in-depth insight and understanding of the engineering and manufacturing of Hydraulic cartridge valves and manifolds\nYou will gain a subject matter expertise of Manufacturing Cost Per Unit, initiating a toolset that enables a data-driven approach to operational and non-operational business improvements.\nThe GSP shall drive the Manufacturing Excellence strategy for competitiveness across all manufacturing technologies in our global operations footprint to attain competitiveness targets and key-results.\nGain an understanding of value streams from source to make and deliver on how Lean Manufacturing can improve efficiency through active participation in efficiency improvement projects.\nPrioritise digitalisation and AI projects to enhance manufacturing practices\nDevelop comprehensive understanding of Technical Functions with the opportunity of being placed in different fields within the Manufacturing setting. This can comprise of Manufacturing Engineering Support (MFE), Manufacturing Operations (MFO), Bosch Production Systems (BPS), Manufacturing Coordination (MFC) & Business Digital Organisation (BDO).\nTake on duties and get to know all aspects of your field in manufacturing as well as in day-to-day business.\nDesign and develop lean manufacturing cells, through analysis of process needs to include process assembly and test equipment.  Work with Manufacturing Services to ensure factory layouts are kept up-to-date and meet business requirements as practices change and evolve\n\nIn the Graduate Specialist Program (GSP), you are in good hands as a technical ace with a soft spot for manufacturing and hydraulics technology. You carry an innovative mindset working towards effective solutions and embrace influencing people.\nEducation: You have completed your Master’s in Technical Engineering or comparable. You have good knowledge on topics of LEAN manufacturing principles.\nExperience and know-how: You bring along experience of manufacturing and knowledge of hydraulics through relevant industrial internships. You possess strong Microsoft Office and IT skills and sound project management experience.\nSoft skills: You are detail oriented and possess strong communication skills, work well in a team and independently.  You are confident, forward- thinking and hold analytical and conceptual capabilities.  You see courage, sincerity, tolerance, and mindfulness as desirable attitudes.\nMobility: Willingness to travel at home and abroad as a part of the job rotation.\nWhat We Offer\nA comprehensive graduate development program with structured rotations.\nDedicated coaching and mentorship from senior leaders.\nExtensive training in SAP and other industry-leading tools.\nThe opportunity to work in a global, innovative, and market-leading company.\nA clear path for career progression for high performers.\n\nWhy Bosch Rexroth?\nA range of benefits are available including employee discounts, various sports and health opportunities, on-site parking\nWe offer a wide variety of interesting and challenging tasks.  Flexible work-time options, benefits and services, employee discounts, various sports and health opportunities, on-site parking, room for creativity.\nYou will be required to evidence your right to work in the UK, as we are unable to sponsor the employment of international workers in this role. International applicants would not be provided with a Skilled Worker visa for this role and will only be able to take up this role if they can demonstrate an alternative right to work in the UK.\n\nWe are unable to provide visa sponsorship beyond the program.\nTo be considered for this program you must have completed a Masters education in the relevant subject mentioned in job description\nThis opportunity is a permanent job beyond the 2 year placement, hence we will not be able to consider applicants unless they have right to work in the UK indefinitely\nYou will be required to evidence your right to work in the UK, as we are unable to sponsor the employment of international workers in this role. International applicants would not be provided with a Skilled Worker visa for this role and will only be able to take up this role if they can demonstrate an alternative right to work in the UK", "resume_html": "", "cover_html": ""}, {"id": "cb9c3d01655659d6", "company": "Bosch", "title": "2026 Fall Quality Engineer Co-op / QMM3 - 1st shift", "location": "Charleston, us", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000127750488-2026-fall-quality-engineer-co-op-qmm3-1st-shift?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-05-21T20:21:07.271Z", "age_days": 21, "jd": "Bosch-Charleston has been a producer of innovative products and Mobility Solutions for nearly 50 years. Our facility delivers power & life-saving technology to the automotive market through Gasoline Injection Systems and Electronic Stability Control. The recent addition of e-Motor production will drive the future generations of electric and hybrid vehicles.\nCome join our team and help us transform the future of Mobility!\nState-of-the-art facilities, equipment, and processes\nSafe and inspiring work environment for our associates\nSkills training available in areas such as Robotics, Lasers, and Vision Systems\nOpportunities for continued professional development and growth\nExternal training and travel opportunities available\nEmpowerment through Associate engagement and incentive programs\nBosch-Charleston is ISO14001 and VPP certified; CO2 Neutral since 2020\nRecent Awards:\nFortune’s World’s Most Admired Companies\nForbes’ America’s Best Large Employers\nForbes’ America’s Best Employers for Diversity\nAmerica’s Best Employers for Veterans\nBOSCH is a proud supporter of STEM (Science, Technology, Engineering & Mathematics) Initiatives\n• FIRST Robotics (For Inspiration and Recognition of Science and Technology)\n• AWIM (A World In Motion)\n\nAs a Quality Engineering Co-op, you'll be at the heart of our operations, ensuring the world-class quality of our port fuel injectors, high-pressure injectors, and high-pressure pumps. These aren't just components; they are the precision instruments that define the performance and sustainability of modern vehicles.\nYour mission, should you choose to accept it, will include:\nMastering the Art of Customer Satisfaction: Collaborate directly with our Customer Quality Engineers, investigating and resolving customer complaints. Your dedication will directly uphold Bosch Charleston's reputation for excellence and foster strong customer loyalty.\nPioneering Preventive Quality: Contribute to critical continuous improvement projects aimed at enhancing quality on our manufacturing lines. You’ll learn to identify potential issues before they arise, embedding quality at every step of the production process.\nLaunching Innovation: Partner with Quality Engineers on new product introductions, ensuring every new solution meets stringent quality standards and delights our customers. Your work will directly contribute to securing future business and maintaining Bosch's competitive edge.\nWhat We're Looking For:\nWe're searching for students who are not only academically strong but also possess an innate drive to learn, adapt, and contribute. We value motivation, discipline, and a keen eye for detail. If you're ready to prove your capabilities in a fast-paced, high-impact environment, Bosch Charleston offers an unparalleled opportunity to grow.\nThis is your chance to gain invaluable experience, develop your professional acumen, and demonstrate your potential for a rewarding career with a global automotive powerhouse. Join us and help shape the future of mobility!\n\nRequired Qualifications:\nCurrently enrolled in a Bachelor's or Master's degree program in Engineering (e.g., Mechanical Engineering, Electrical Engineering, Industrial Engineering, Materials Science, Automotive Engineering) or a related technical field\nA minimum GPA of 3.0 on a 4.0 scale (or equivalent)\nStrong analytical and problem-solving skills\nExcellent verbal and written communication skills\nProficiency in Microsoft Office Suite (Excel, Word, PowerPoint)\nAbility to work effectively both independently and as part of a team\nDemonstrated motivation, discipline, and a strong work ethic\nWillingness to learn and adapt quickly in a fast-paced manufacturing environment\nLegally authorized to work in the United States\nPreferred Qualifications:\nPrevious experience (academic projects, internships, or personal projects) demonstrating an interest in manufacturing, quality, or the automotive industry\nFamiliarity with quality tools and methodologies such as 8D Problem Solving, 5 Whys, Fishbone Diagrams, or FMEAs (Failure Mode and Effects Analysis)\nBasic understanding of statistical process control (SPC) or data analysis techniques\nAbility to read and interpret technical drawings and specifications\nExperience with project management principles or tools\n\nThe above summary is consistent with the company's compensation philosophy and represents a fair description of the position, as supplied by the appropriate unit(s). It is intended to describe the general nature and level of work performed by this position and is not an exhaustive list of all job duties. Management reserves the right to revise or amend duties at any time.\nEqual Opportunity Employer, including disability / veterans.\nIndefinite U.S. work authorized individuals only. Future sponsorship for work authorization is not available.\nYour well-being matters at Bosch! We offer a competitive compensation and a benefits package designed to empower you in every area of your life. This includes premium health coverage, a 401(k) with generous matching, resources for financial planning and goal setting, ample paid time off, parental leave, and comprehensive life and disability protection. We're investing in your success! Bosch Benefits | Bosch in the USA\nWant a closer look at life at Bosch? Follow our social channels and see what it’s like to work here:\nInstagram\nFacebook\nLinkedIn\nYouTube\nTikTok\nBy submitting an application for employment with Bosch, you represent and warrant that: (a) the work product and materials you submit are your own and reflect your personal experience, skills and qualifications; and (b) you have not used artificial intelligence or automated tools to generate, alter, or enhance application materials or responses in a manner that misrepresents your identity, authorship, experience, capabilities or qualifications.", "resume_html": "", "cover_html": ""}, {"id": "4338d1929d21d9c4", "company": "Bosch", "title": "Sales Account Manager - Performance / Tuning Segment", "location": "Plymouth, us", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000127747509-sales-account-manager-performance-tuning-segment?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-05-21T19:53:58.827Z", "age_days": 21, "jd": "At Bosch Mobility Aftermarket, we believe in creating a work culture that embodies our core values of grow, enjoy, and inspire. Our Mobility Aftermarket division provides diagnostic and repair shop equipment, spare parts, and repair solutions for passenger cars and commercial vehicles worldwide. Our Automotive Service Solutions operations supply testing and repair-shop technology, diagnostic software, service training, and information services.\nAs a member of our team, you will have the opportunity to grow your skills and knowledge while working with cutting-edge technology. We want you to enjoy what you do and feel inspired to contribute your best to our customers and to the growth of our business. We believe that by cultivating a work environment that encourages personal and professional growth, enjoyment, and inspiration, we can achieve great things together.\nJoin us at Bosch Mobility Aftermarket and help us shape the future of mobility!\n\nIn this position you will be responsible for selling Bosch’s automotive product portfolio (all product lines including fuel injection systems, electrical drives, chassis control, and more) to new and existing Performance and Thermal management customers, both in the OE and OES channels.\nResponsibilities:\nCross-functional and cross-divisional coordination with regards to strategy, market development, management of requirements in key growth areas.\nStrategic and operational account management for existing and new customers (i.e. price / contract negotiations, product lifecycle management, KPI tracking).\nIdentify and act upon new growth opportunities with new and existing customers/markets, specifically in the Performance and Thermal management segments.\nDevelopment, implementation and tracking of a strategic roadmap for new customer acquisitions as well as new products launch to the customers.\nDerive market requirements for product management and jointly develop required product roadmap to grow business with key customers.\nActively participate in a global sales team to align activities and conditions for related customers.\n\nBachelor's degree in related area (Sales, Marketing, Engineering)\n3+ years of experience managing customers, including technical sales, marketing or engineering experience.\nStrong communication and collaboration skills with team, customer and peers\nExcellent time management and organizational skills\nTechnical competence to drive high level product related discussions with customers\nIndependent and flexible in dealing with new tasks and initiatives\nAbility to solve complex problems independently\nExcellent verbal and written presentation / communication skills;\nAbility to travel minimum 20%\nMust be eligible to work in the US without VISA sponsorship. Not eligible for international assignee\nIndefinite U.S. work authorized individuals only. Future sponsorship for work authorization is not available.\n\nAll your information will be kept confidential according to EEO guidelines.\nEqual Opportunity Employer, including disability / veterans.\nComprehensive Benefit Offering – All benefits are effective DAY 1!\nMedical, Dental & Vision\nLife and Supplement Life\nLong and Short Term Disability\nPaid Time Off & Holidays\n401K – with generous company match\nIn addition to 401K, additional retirement benefit 100% company paid\nAnnual bonuses\nTuition Assistance\nPaid Volunteer Time\nAssociate Discounts on Bosch products like home appliances, power-tools, thermal products like tank-less water heaters and more\nThe Bosch Group is a leading global supplier of technology and services. It employs roughly 402,600 associates worldwide (as of December 31, 2021). The company generated sales of 78.7 billion euros in 2021. Its operations are divided into four business sectors: Mobility Solutions, Industrial Technology, Consumer Goods, and Energy and Building Technology. As a leading IoT provider, Bosch offers innovative solutions for smart homes, Industry 4.0, and connected mobility. Bosch is pursuing a vision of mobility that is sustainable, safe, and exciting. It uses its expertise in sensor technology, software, and services, as well as its own IoT cloud, to offer its customers connected, cross-domain solutions from a single source. The Bosch Group’s strategic objective is to facilitate connected living with products and solutions that either contain artificial intelligence (AI) or have been developed or manufactured with its help. Bosch improves quality of life worldwide with products and services that are innovative and spark enthusiasm. In short, Bosch creates technology that is “Invented for life.”\nhttps://www.bosch.us/careers/why-bosch/culture-and-benefits/\nhttps://www.myboschbenefits.com/public/welcome", "resume_html": "", "cover_html": ""}, {"id": "5507e426f318c6f9", "company": "Bosch", "title": "数据和AI科学家_CR", "location": "Shanghai, cn", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000127663179--ai-cr?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-05-21T12:48:32.727Z", "age_days": 21, "jd": "Do you want beneficial technologies being shaped by your ideas? Whether in the areas of mobility solutions, consumer goods, industrial technology or energy and building technology - with us, you will have the chance to improve quality of life all across the globe. Welcome to Bosch.\n\nCompany Description\nDo you want beneficial technologies being shaped by your ideas? Whether in the areas of mobility solutions, consumer goods, industrial technology or energy and building technology - with us, you will have the chance to improve quality of life all across the globe. Welcome to Bosch.\nJob Description\nCorporate Research – Research and Technology Center Asia Pacific is a team of international & interdisciplinary scientists, driving cutting edge research to leverage on Asia’s excellent expertise. Scientifically verified knowledge and insights are the foundation of our sustainable solutions. Through our innovation, we develop a vision for the future product of Bosch, evaluate its feasibility, and convert it into practical solutions. We set trends and enable new business opportunities for Bosch.\nPosition Summary\nWe are looking for a Data & AI Scientist to develop advanced analytics, machine learning, and big-data pipelines for real-world PEM fuel cell truck operation data. The successful candidate will mine vehicle field data to detect degradation signatures, quantify lifetime-relevant operating stressors, build health-state and remaining-useful-life models, and support engineering decisions for fuel cell system optimization.\nThis role sits at the intersection of:\nbig-data engineering, machine learning, and causal analytics.\nKey Responsibilities\nData Processing & Visualization: Clean, process, and analyze massive volumes of time-series field data.\nIndependent Data Exploration: Proactively explore the data with an innovative mindset to discover valuable insights regarding fuel cell degradation behaviors and influencing environmental/operational factors.\nAdvanced AI & Machine Learning: Design, train, and deploy machine learning models to solve complex engineering challenges.\nDesign Optimization Support: Identify potential design flaws or operational inefficiencies through data forensics and provide actionable feedback to support continuous hardware and software design iterations.\nCross-Functional Collaboration: Act as the bridge between data science and physical engineering. Work closely with fuel cell domain experts to contextualize data findings and translate them into real-world system improvements.\nCloud Database Management: Manage the project's data on Cloud, ensuring efficient data retrieval and pipeline operations using HBase, Redis, Kafka, Spark, and MySQL.\n\nQualifications\nEducation: Ph.D. degree in Data Science, Computer Science, Applied Mathematics, Engineering, or a highly relevant discipline.\nData processing and programming: Strong programming skills for data analysis and algorithm development.\nDatabase and SQL skills: Practical experience with common databases such as MySQL, Microsoft SQL Server\nBig-data and distributed-computing capability: Experience to work with distributed storage and computing technologies, including: HDFS; Hive; Spark; RDD/DataFrame concepts; Spark transformations; Spark job, stage, and task concepts;\nMachine Learning Expertise: Strong foundation in machine learning, statistical modeling, and AI algorithms, particularly with time-series data and pr const sel = {approve:new Set(), reject:new Set()};
const scoreColor = s => s>=85?'#0b6e4f':s>=70?'#2563eb':s>=50?'#b45309':'#94a3b8';
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function renderCards(){
  const order=['discovered','scored','approved','docs_ready','prefilled','applied'];
  let total=Object.values(COUNTS).reduce((a,b)=>a+b,0);
  let h=`<div class="card"><div class="n">${total}</div><div class="l">total</div></div>`;
  order.forEach(k=>{if(COUNTS[k])h+=`<div class="card"><div class="n">${COUNTS[k]}</div><div class="l">${k.replace('_',' ')}</div></div>`});
  document.getElementById('cards').innerHTML=h;
}
function filtered(){
  const q=document.getElementById('q').value.toLowerCase();
  const ms=+document.getElementById('minScore').value||0;
  const sec=document.getElementById('sector').value;
  const phd=document.getElementById('phd').checked;
  return JOBS.filter(j=>{
    const sj=j.score_json||{};
    if(q && !((j.company+' '+j.title).toLowerCase().includes(q))) return false;
    if((j.score||0)<ms) return false;
    if(sec && sj.sector!==sec) return false;
    if(phd && !sj.is_phd) return false;
    return true;
  });
}
function card(j){
  const sj=j.score_json||{};
  let tags='';
  if(sj.sector)tags+=`<span class="tag sector">${esc(sj.sector)}</span>`;
  if(sj.is_phd)tags+='<span class="tag phd">PhD</span>';
  if(sj.german_required)tags+=`<span class="tag de">German ${esc(sj.german_required)}</span>`;
  if(sj.tier)tags+=`<span class="tag">tier ${esc(sj.tier)}</span>`;
  if(j.age_days!=null)tags+=`<span class="tag" style="background:#dcfce7;color:#166534">${j.age_days<=0?'today':j.age_days+'d ago'}</span>`;
  else tags+='<span class="tag" style="background:#fef9c3;color:#854d0e">date?</span>';
  if(sj.link_ok===false)tags+='<span class="tag" style="background:#fee2e2;color:#991b1b">⚠ link dead</span>';
  const reasons=(sj.reasons||[]).slice(0,4).map(r=>`<li>${esc(r)}</li>`).join('');
  const docs=(j.resume_html||j.cover_html)?`<button class="blue" onclick="openJob('${j.id}')">View docs &amp; JD</button>`:`<button class="ghost" onclick="openJob('${j.id}')">View JD</button>`;
  return `<div class="job"><div class="badge" style="background:${scoreColor(j.score)}">${j.score??'—'}</div>
   <div class="jobmain"><h3>${esc(j.title)}</h3>
   <div class="co">${esc(j.company)} · ${esc(j.location||'n/a')} <span class="pill" style="background:#64748b">${j.state}</span></div>
   <div class="tags">${tags}</div><ul class="reasons">${reasons}</ul>
   <div style="display:flex;gap:8px;flex-wrap:wrap">
     <a href="${esc(j.url||'#')}" target="_blank"><button class="ghost">Open posting ↗</button></a>
     ${docs}
     <button class="ok" onclick="pick('approve','${j.id}')">✓ Approve</button>
     <button class="no" onclick="pick('reject','${j.id}')">✕ Reject</button>
   </div></div></div>`;
}
function render(){
  const f=filtered();
  document.getElementById('qhead').textContent=`Review queue · ${f.length} shown`;
  document.getElementById('list').innerHTML=f.map(card).join('')||'<p style="color:#64748b">No matches.</p>';
}
let curDoc='jd';
function openJob(id){
  const j=JOBS.find(x=>x.id===id); curDoc='jd';
  document.getElementById('m_title').textContent=j.title;
  document.getElementById('m_co').textContent=j.company+' · '+(j.location||'');
  document.getElementById('m_url').href=j.url||'#';
  let tabs=`<button class="tabbtn active" onclick="showDoc('${id}','jd',this)">Job description</button>`;
  if(j.resume_html)tabs+=`<button class="tabbtn" onclick="showDoc('${id}','resume',this)">Résumé</button>`;
  if(j.cover_html)tabs+=`<button class="tabbtn" onclick="showDoc('${id}','cover',this)">Cover letter</button>`;
  document.getElementById('m_tabs').innerHTML=tabs;
  showDoc(id,'jd',document.querySelector('#m_tabs .tabbtn'));
  document.getElementById('modal').showModal();
}
function showDoc(id,which,btn){
  document.querySelectorAll('#m_tabs .tabbtn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const j=JOBS.find(x=>x.id===id);
  const body=document.getElementById('m_body');
  if(which==='jd'){body.innerHTML=`<pre class="jd">${esc(j.jd)||'(no JD captured)'}</pre>`;}
  else{const html=which==='resume'?j.resume_html:j.cover_html;
    const ifr=document.createElement('iframe');ifr.srcdoc=html;body.innerHTML='';body.appendChild(ifr);}
}
function pick(kind,id){
  sel[kind].add(id); sel[kind==='approve'?'reject':'approve'].delete(id); updateBar();
}
function updateBar(){
  const a=[...sel.approve], r=[...sel.reject];
  document.getElementById('cmd_approve').textContent='python -m jobauto approve '+(a.join(' ')||'—');
  document.getElementById('cmd_reject').textContent='python -m jobauto reject '+(r.join(' ')||'—');
  document.getElementById('cmdbar').style.display=(a.length||r.length)?'flex':'none';
}
function copyCmds(){
  const a=[...sel.approve], r=[...sel.reject]; let lines=[];
  if(a.length)lines.push('python -m jobauto approve '+a.join(' '));
  if(r.length)lines.push('python -m jobauto reject '+r.join(' '));
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('Copied:\n'+lines.join('\n')));
}
function clearSel(){sel.approve.clear();sel.reject.clear();updateBar();}
['q','minScore','sector','phd'].forEach(id=>document.getElementById(id).addEventListener('input',render));
renderCards(); render();
</script></body></html>

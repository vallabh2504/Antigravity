for the automotive industry, electrical bicycles and Internet of Things.\n\nProblem statement\nGenerative AI (GenAI) is transforming software development. Tool support powered by large language models (LLMs), such as GitHub co-pilot and ChatGPT, are becoming an integrated part of the software development workflow. LLM-based agents, which take on software development tasks more autonomously, are now starting to emerge. While an LLM provides replies to prompts in one step, an LLM-based agent can autonomously perform tasks and take decisions, using an LLM in several steps. In addition to an LLM, the agent includes perception capabilities, memory, and supporting resources, and can provide the LLM with context intelligence via the Model Context Protocol (MCP).\nWhen multiple agents collaborate, we get a dynamic system where agents jointly work on a problem where human involvement changes from being aware of all details to a supervisory role. Setting up an infrastructure for a multi agent system and how to manage it is still an open question where several frameworks and platforms are emerging and key characteristics and how to balance different decisions are not known.\nProposed solution\nWe want to explore which are the prominent frameworks and platforms emerging for managing the agent operations to understand the capabilities and limitations. We also want to set up an example multi-agent system on a Bosch infrastructure to get hands-on experience and an insight into what is required in terms of knowledge and infrastructure to operate a multi-agent system.\nWe also want to explore and understand where to deploy agents – on a personal computer, on a local on-premises hardware or in the cloud. There are different aspects to consider such as cost and data integrity. There might be decision to take while setting up a system (design-term) as well as more or less automatic decisions during runtime (operations).\nYou will have the opportunity to shape the thesis based on your knowledge, skills and discoveries during the project.\nScope of thesis project\nTwo students on master level working onsite at the Lund office (primarily).\n\nYour profile\nIn order to be successful in the project we think you are:\nA student in Information Technology, Computer Science, Electrical Engineering, or similar\nExperience with AI a general and specifically using pre-trained models and related technique (e.g. RAG, multi-agents, etc.)\nExperience and interest in agentic development\nDriven, able to challenge yourself, and gain the experience needed to move the project forward.\n\nSupervisor\nThomas Olsson, thomas.olsson@se.bosch.com\nPlease note: Only applications from students at a Swedish University are accepted.", "resume_html": "", "cover_html": ""}, {"id": "5879f25d82b74669", "company": "Bosch", "title": "[QMM] QMM Admin Intern", "location": "Ho Chi Minh, vn", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131607155--qmm-qmm-admin-intern?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-11T08:03:33.222Z", "age_days": 0, "jd": "The Bosch Group is a leading global supplier of technology and services. Its operations are divided into four business sectors: Mobility, Industrial Technology, Consumer Goods, and Energy and Building Technology. With technology that is “Invented for life,” Bosch wants to help improve quality of life and conserve natural resources. \nThe Bosch Group comprises Robert Bosch GmbH and its roughly 490 subsidiary and regional companies in over 60 countries. Including sales and service partners, Bosch’s global manufacturing, engineering, and sales network covers nearly every country in the world. Bosch’s innovative strength is key to the company’s further development. \nBosch Global Software Technologies Company Limited (BGSV) is 100% owned subsidiary of Robert Bosch GmbH, offering end-to-end Engineering, IT, and Business Solutions.  \nStarting its operation from 2010 at Etown 2 in HCMC, nSie haben Fragen zum Bewerbungsprozess?\n\nKatharina Bald (Personalabteilung)\n\n+49 9352 18 1215\nSie haben fachliche Fragen zum Job?\n\nElke Gerhart (Fachabteilung)\n\n+49 9521 683 346\nWeitere Informationen zu uns finden Sie auch auf www.boschrexroth.de/karriere sowie auf unseren Social Media Kanälen, beispielsweise Instagram.\nMove with us. Win together.", "resume_html": "", "cover_html": ""}, {"id": "20cfcca7aea59817", "company": "Bosch", "title": "Facilities Operations Specialist", "location": "Clayton, au", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131588739-facilities-operations-specialist?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-11T05:12:28.527Z", "age_days": 0, "jd": "With a proud history dating back 140 years, the Bosch Group now employs over 413,000 people across 60 countries incorporating 150 nationalities. As a leading IoT company, Bosch offers innovative solutions for smart homes, smart cities, connected mobility, and connected manufacturing. The Bosch Group’s strategic objective is to facilitate connected living and innovations for a connected life. Bosch improves quality of life worldwide with products and services that are innovative and spark enthusiasm. In short, Bosch creates technology that is “Invented for life.” To this day, Bosch remains privately owned, with 94% held by a charitable trust. Bosch is a rather special company. With its more than 470 locations worldwide, the Bosch Group has been carbon neutral overall (scopes 1 & 2 of the Greenhouse Gas Protocol Corporate Accounting and Reporting Standard) since 2020. This is achieved with four levers: improving energy efficiency, generating energy from renewable sources, purchasing green electricity, and offsetting residual CO₂ emissions with carbon credits. Visit sustainability.bosch.com for further information on the Bosch Group’s sustainability strategy.\nOur Bosch Australia Facilities management department (FCM) is affiliated with the Asia Pacific region of the Bosch Global Real Estate division. This network opens the door to global and regional cross collaboration which empowers our facilities team towards the common GR goal of creating inspirational working environments. The FCM department is responsible for facilities, services, operations and maintenance for Clayton and supports our Oceania locations.\n\nPermanent Full-Time Opportunity | Clayton Headquarters\nAre you an experienced facilities professional who thrives on balancing strategic planning, project delivery, stakeholder management and operational excellence?\nAbout the Role\nWe are seeking a proactive and highly organised Facilities Operations Specialist to join our dynamic Facilities, Construction & Maintenance (FCM) team at Bosch's Clayton Headquarters. This exciting role offers a unique opportunity to lead improvement projects, oversee space planning and tenancy activities, identify business opportunities and drive systems enhancements across one of our largest regional sites. All of which play a key role in the ongoing optimisation of the Clayton site Master Plan.\nAs the Facilities Operations Specialist, you'll play a vital part in managing, planning, and optimizing our facility operations—coordinating space management, liaising with tenants, and ensuring safety and compliance standards are met. If you're driven to enhance operational efficiency and foster continuous improvement, this is the perfect role for you.\nKey Responsibilities\nSupport the ongoing development and optimisation of the Clayton site Master Plan\nBuild strong relationships and collaborate with both internal stakeholders and associates across the Asia Pacific Region  \nSupport CAPEX budget planning, tracking, KPI reporting and facilities performance monitoring.\nCoordinate and manage projects from planning through to implementation and support continuous improvement initiatives.\nConduct annual Site Assessment and Space Inventory reporting to Bosch Global Real Estate using the Computer-Aided Facility Management (CAFM) Software Tool.\nMonitor occupancy and utilization of building spaces to optimize operational efficiency\nManage space related requests, conducting discussions with stakeholders to clarify requirements and evaluate available spaces for offices, laboratories and workshops.\nManage and optimise space planning and space allocation across the Clayton site.\nSupport identification of suitable new tenants and establishment of Commercial Licence Agreement\nManage tenant fit-out, handover and reinstatement works\nManage tenant relations, ensuring Licence compliance and addressing tenant requests\nManage and maintain the departmental IT Data Concept and Software Applications ensuring compliance with Data Security & Information Systems protocols\nOversee outsourced facilities service contracts\nManage the departmental Process Document Quality System. Ensuring regular document reviews by process owners and ensuring system gaps are identified and closed.\nConduct risk assessments and ensure compliance with health, safety and environmental requirements.\n\nYou are a solutions-focused facilities professional with a can-do attitude who enjoys working across multiple projects and stakeholders while driving operational improvements.\nTo be successful, you will have:\nQualifications in Facilities Management, Engineering, Business Administration or a related discipline.\nProven experience in facilities operations, facilities management, project management or a similar role.\nStrong understanding of facilities management principles, building operations and property management.\nExperience managing projects, budgets, contractors and service providers.\nStrong analytical, critical thinking and problem-solving capabilities.\nExperience conducting risk assessments and implementing process improvements.\nAdvanced Microsoft Office skills, particularly Excel.\nExperience with SAP, Building Management Systems (BMS) and facilities software platforms.\nExcellent communication, stakeholder management and presentation skills.\nA strong safety mindset and commitment to compliance.\nDesirable\nIT systems, data management or data security knowledge.\nRelevant professional facilities management certifications.\nWhy Bosch?\nAt Bosch, we invest in our people and provide opportunities to work on meaningful projects within a collaborative and supportive environment. This role offers exposure to local and global stakeholders, strategic facilities initiatives, and the opportunity to make a genuine impact on the future of our workplace operations.\nOccasional domestic and international travel may be required.\nIf you are looking for a varied and rewarding facilities role where you can combine operational expertise, project management and strategic planning, we would love to hear from you.\n\nWe recognise that our employees are our greatest asset. Through the diversity of our business and commitment to personal and career development, we can provide you with new and exciting opportunities so you can achieve your full potential!\nWe offer our employees:\nThe ability to work flexibly\nTraining and development programs to help you reach your full potential\n14 weeks paid (or 28 weeks at half-pay) Parental Leave for primary carer (in addition to government paid parental leave)\nSuperannuation on unpaid Parental Leave\nThe option to purchase additional annual leave\nA wide range of Health and Well-being programs\nSupport and counselling services with work or personal matters through our Employee Assistance Program\nUp to 50 weeks Income Protection for permanent employees\nDiverse and exciting career opportunities, both local and international\nDiscounts on Bosch products and as well as products from affiliated brands\nYour application \nWe are committed to building a sustainable, inclusive, and diverse workforce in all its forms.  We value diversity in our organisation and in our recruitment activities and believe that every voice adds value. We actively pursue a recruiting strategy that works towards eliminating unconscious bias. To apply, please submit your cover letter and resume through the online application link.\nPlease note: You need to be an Australian citizen, or hold Australian work rights, to apply for this role.\nBosch does not accept any agency submissions unless approval has been given by a member of the Bosch HR Team. All agency submissions must be submitted directly to Bosch HR. Potential candidates submitted by an agency directly to any Bosch employee or manager without Bosch HR approval will not be considered by Bosch. Bosch will not be liable for a recruitment fee in these circumstances. Any agency terms and conditions must be signed by Bosch HR indicating acceptance.", "resume_html": "", "cover_html": ""}, {"id": "b3bee7d9c8a95b9d", "company": "Bosch", "title": "[ECA] Embedded Software Engineer (Chinese Speaking) - Ha Noi Location", "location": "Ha Noi, vn", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131587640--eca-embedded-software-engineer-chinese-speaking-ha-noi-location?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-11T04:51:32.658Z", "age_days": 0, "jd": "The Bosch Group is a leading global supplier of technology and services. Its operations are divided into four business sectors: Mobility, Industrial Technology, Consumer Goods, and Energy and Building Technology. With technology that is “Invented for life,” Bosch wants to help improve quality of life and conserve natural resources. \nThe Bosch Group comprises Robert Bosch GmbH and its roughly 490 subsidiary and regional companies in over 60 countries. Including sales and service partners, Bosch’s global manufacturing, engineering, and sales network covers nearly every country in the world. Bosch’s innovative strength is key to the company’s further development. \nBosch Global Software Technologies Company Limited (BGSV) is 100% owned subsidiary of Robert Bosch GmbH, offering end-to-end Engineering, IT, and Business Solutions.  \nStarting its operation from 2010 at Etown 2 in HCMC, BGSV is the first software development center of Bosch in Southeast Asia. BGSV nowadays have over 4,000 associates, with a global footprint and presence in the US, Europe, and the Asia Pacific region. With our unique ability to offer end-to-end solutions that connect sensors, software, and services, we enable businesses to move from the traditional to digital or improve businesses by introducing a digital element in their products and processes. \nBGSV currently operates from three offices located at the following addresses: \n1. Etown Building – 364 Cong Hoa Street, Ward 13, Tan Binh District, Ho Chi Minh City, Vietnam \n2. OfficeHaus Building – 32 Tan Thang Street, Son Ky Ward, Tan Phu District, Ho Chi Minh City, Vietnam \n3. Capital Place Building – 29 Lieu Giai Street, Ngoc Khanh Ward, Ba Dinh District, Hanoi, Vietnam\n\nAnalyze, design, develop, and maintain complex embedded software components based on business and technical requirements.\nPerform software requirement engineering, including analyzing, validating, and maintaining customer requirements.\nPerform software integration activities, including configuring and merging software modules into a unified build.\nCreate and execute unit, component, and integration test cases to verify software functionality and ensure compliance with quality standards.\nApply established software development processes and coding standards to produce reliable and maintainable code for embedded systems.\nUtilize debugging and analysis tools to investigate, troubleshoot, and resolve complex software defects and performance issues.\nMentor junior engineers by providing guidance on technical tasks, coding practices, and problem-solving techniques.\nContribute to technical reviews and team knowledge-sharing sessions.\nEnsure compliance with applicable industry standards, regulatory requirements, company policies, and quality frameworks applicable to the role and assigned projects.\n\nEducation: Bachelor’s degree or higher in Computer Science, Software Engineering, Electrical Engineering, Electronics, Telecommunications, Control and Automation Engineering, Mechatronics, or a related field.\nProgramming Expertise: Strong programming skills in C/C++, with experience in scripting languages like Python or others such as C#.\nTechnical Knowledge: Solid foundation in Control Systems, Automation, Embedded Systems, and familiarity with automotive communication protocols (e.g., CAN, LIN, Ethernet). Experience in areas such as Automotive Ethernet, Base Software (BSW), Bootloader, COM Stack, Cyber Security, Device Drivers, Diagnostics, and Real-Time Operating Systems.\nLanguage Skills:Proficient in English Communication.\nAdvanced Chinese Proficiency (HSK5 or above).\n\nTools & Certifications:Proficient in using Source Control, Test Frameworks, and Software Lifecycle Management tools.\nCertifications in embedded systems or relevant software development methodologies are a plus.\n\nWhy BOSCH?\nBecause we don't just follow trends, we create them.\nBecause together we turn ideas into reality, working every day to make the world of tomorrow a better place. Do you have high standards when it comes to your job? So do we. At Bosch, you will discover more than just work.\nBenefits and Career Opportunities\nWorking in one of the Best Places to Work in Vietnam and Top 30 of the Most Innovative Companies all over the world\nJoin a dynamic and fast growing global company (English-speaking environment)\n13th-month salary bonus + attractive performance bonus (you'll love it!) + annual performance appraisal\n100% monthly salary and mandatory social insurances in 2-month probation\nOnsite opportunities: short-term and long-term assignments\n15++ days of annual leave + 1 day of birthday leave\nPremium health insurance for employee and 02 family members\nFlexible working time\nLunch and parking allowance\nVarious training on hot-trend technologies/ foreign language (English/Chinese/Japanese) and soft-skills\nFitness & sport activities: football, badminton, yoga, Aerobic\nFree in-house entertainment facilities and snack\nJoin in various team building, company trip, year-end party, tech talks and a lot of charity events", "resume_html": "", "cover_html": ""}, {"id": "2650e5de911faa01", "company": "Bosch", "title": "Staff / Senior Software Development Engineer", "location": "Bayan Lepas, my", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131586259-staff-senior-software-development-engineer?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-11T04:28:15.182Z", "age_days": 0, "jd": "Bosch Cross-Domain Computing Solutions (XC) is a business division within the Mobility Solutions\n\nbusiness sector of the Bosch Group. The division unites software, electrical and electronics\n\nengineers from the areas of driver assistance, automated driving, car multimedia, powertrain and\n\nbody electronics in a new unit. XC play a leading role in shaping the dynamic shift toward ever more\n\ndigitalization in the vehicle.\n\nXC-CP/ENG-Pg is the development department for Cross-Domain Computing Solutions (XC) in\n\nPenang integrated into the XC development network and serves as a center for global engineering.\n\nXC-CP/ENG-Pg is responsible for both state of the art and cost driven platform architecture and\n\ndevelopment in the areas of\n\n• V2X connectivity control units – enabling vehicles to communicate with one another and with\n\ntheir surroundings.\n\n• Infotainment and cockpit solutions – reducing complexity in the cockpit by building multiple\n\nfunctions in a single control unit.\n\n• Infotainment systems – enhance safety and convenience with smart infotainment systems.\n\nJoin our exciting Research and Development team TODAY! You will be part of the next megatrend in\n\nautomotive evolution, working in leading edge technologies and also working with world leading car\n\nmanufacturers.\n\nCollaborate as project team member on Software design matters.\nCapture and evaluate customer, internal requirements and vehicle specific interface requirements. Identify suitable concept in terms of functional, technological and effort.\nAdhere to Bosch Software Engineering Process as e.g.:-Perform requirement reviews, design reviews and code reviews.\nPerform unit testing and release of the software according to SW release process.\n\nDevelop the SW design taking into consideration the dependencies to other module and integration into the overall system.\nSW programming using both standard and proprietary software tools and libraries.\nCreate SW test specifications and protocols, if necessary develop test SW. Executes test plans to ensure new software meets specifications, functionalities and performance requirements.\nAnalyze failure log, clarify system problems and resolve design issues.\nDevelop and produce technical reports, design analysis and documentation in support of designs.\nAssist Manufacturing in troubleshooting manufacturing related problems.\nProvide post-production support.\n\nBachelor Degree in Electrical / Electronic Engineering or Computer Engineering / Science\nProven working experience in embedded software engineering\nExperience in hands-on development and troubleshooting on embedded targets\nSolid programming experience in C, C++ or object oriented programming\nExperience in Linux embedded development in cross-compiling, OS toolchain, Yocto/Debian build system, Linux file system, GDB, Linux bash scripts\nAdequate knowledge in Linux driver porting and Kernel device tree\nAdequate knowledge of reading schematics and data sheets for components\nGood oral / written communication and interpersonal skills\nAble to integrate and to work in a team\nWilling to work in Bayan Lepas Phase\nFresh graduates are welcome to apply.\n\nLeave Entitlement e.g: Annual Leave, Medical Leave and etc\nCompany Insurances and etc", "resume_html": "", "cover_html": ""}, {"id": "305c94d64a11e490", "company": "Bosch", "title": "[SX/EIT-MM] Senior AI/Agent Engineer", "location": "Thành phố Hồ Chí Minh, vn", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131586069--sx-eit-mm-senior-ai-agent-engineer?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-11T04:25:44.454Z", "age_days": 0, "jd": "The Bosch Group is a leading global supplier of technology and services. Since the beginning of 2013, its operations have been divided into four business sectors: Automotive Technology, Industrial Technology, Consumer Goods, and Energy and Building Technology.\nThe Bosch Group comprises Robert Bosch GmbH and its roughly 360 subsidiaries and regional companies in some 50 countries. If its sales and service partners are included, then Bosch is represented in roughly 150 countries. This worldwide development, manufacturing, and sales network is the foundation for further growth.\nBosch Global Software Technologies Company Limited (BGSV) is 100% owned subsidiary of Robert Bosch GmbH - one of the world’s leading global suppliers of technology and services, offering end-to-end Engineering, IT, and Business Solutions.\nStarting its operation from 2010 at Etown 2 in HCMC, BGSV is the first software development center of Bosch in Southeast Asia. BGSV nowadays have over 4,000 associates, with a global footprint and presence in the US, Europe, and the Asia Pacific region.\nWith our unique ability to offer end-to-end solutions that connect sensors, software, and services, we enable businesses to move from the traditional to digital or improve businesses by introducing a digital element in their products and processes.\n\nThe role\nWe are building the next generation of production AI agent systems — systems that reason, plan, call tools, delegate across specialized sub-agents, and deliver real business outcomes end to end. We are looking for a senior engineer who has gone deep on modern machine learning, transformers and agents, and who wants to build at the frontier of what language models and multimodal systems can actually do in production today.\nThis is not a \"wrap an API around an LLM\" role. We expect candidates who understand why things work — the mechanics of attention, the failure modes of autoregressive decoding, the cost/latency trade-offs of caching and tool routing, the pitfalls of context engineering at scale. And who can turn that understanding into systems that ship, hold up under load, and keep improving.\nWhat you'll do\nArchitect agentic systems — plan, memory, tool use, multi-agent delegation, evaluation loops, guardrails. Pick the right abstraction for the problem, not the one on the hype curve.\nPush model capability into production. Design prompt and context strategies, tool interfaces, retrieval and reranking, structured output, streaming, and evaluation — across text and multimodal inputs (vision, documents, audio).\nOwn the evaluation story. Build offline eval sets, online LLM-as-judge loops, regression harnesses. Know the difference between a metric that moves your users and a metric that moves only your dashboard.\nSqueeze the system. Prompt caching, batching, speculative decoding, model routing, token budget management, latency targets. Know your P50/P99 and why they look the way they do.\nContribute upstream. Read SDK source when docs are thin, open PRs against open-source agent frameworks, write crisp bug reports when a vendor's orchestration service returns a weird 500.\nMentor and set the bar. Your design reviews, code reviews and technical writing shape how the rest of the team thinks about agents.\nThis is a senior role. We expect candidates who:\nCan scope an ambiguous agent problem, pick an architecture, ship a v1, and know what to measure to decide whether v2 is worth building.\nHave built agent systems that handle real users, real data, real money — not just demos.\nStay current — reading papers, trying new models the week they drop, benchmarking their own stacks.\nRaise the quality of the team around them.\n\nRequired experience\nSolid ML fundamentals. You can explain transformers — attention, positional encoding, KV cache, tokenisation, sampling — without hand-waving. You've read at least a few core papers in full, not just the abstracts.\nDeep LLM application experience. Multiple production systems built on top of frontier models (Anthropic, OpenAI, Gemini, open-weight). You know the practical edge cases: tool-use stability, structured-output failure modes, long-context degradation, prompt-injection defence, cost control.\nAgent systems depth. You've built something with real agent behaviour — planning, memory, tool orchestration, multi-step execution, error recovery — not a single prompt in a loop. Experience with multi-agent coordination (delegation, sub-agent protocols, MCP-style tool servers) is a strong plus.\nMultimodal experience. Hands-on work with vision-language models, document AI (OCR, layout, tables), or audio — end-to-end from ingest to grounded output.\nStrong engineering craft. Python at a senior level — async, typing, testing, packaging, observability. Able to read and navigate a large codebase. Git hygiene that makes reviewers' lives easier.\nProduction mindset. Metrics, alerts, eval gates, safe rollouts. You think about what happens at 3am when the model provider degrades, not just about the happy path.\nFluent with modern coding agents. You use Claude Code / Cursor / Copilot / equivalents daily as a force multiplier. You understand where they shine and where they fail, and you can design prompts, context and tool boundaries to get the most out of them.\nCommunication. Writes and speaks clearly in English. Additional language(s) are a plus.\nStrongly preferred\nPublished ML work (papers, workshop submissions, open-source projects, technical deep-dive blog posts) that shows original thinking.\nExperience fine-tuning, distilling, or post-training open-weight LLMs — SFT, DPO, RLHF, LoRA — even at small scale.\nExperience with vector search, retrieval-augmented generation, reranking at scale.\nExperience shipping production evaluation infrastructure (eval sets, online judges, A/B for LLM systems).\nCloud-native production experience — containerised services, CI/CD, observability (OpenTelemetry, traces, metrics, logs).\n\nThis position will be contracted through Bosch’s external vendor under a 1-year contract. Salary and benefits will be discussed during interview", "resume_html": "", "cover_html": ""}, {"id": "c8a6be52643fde99", "company": "Bosch", "title": "Quality Specialist - Quality Methodology Management", "location": "Dong Nai, vn", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131584939-quality-specialist-quality-methodology-management?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-11T03:52:43.388Z", "age_days": 0, "jd": "Bosch first started its operations in Vietnam in 1994 and registered a wholly-owned subsidiary in 2008. According to the business strategy of Bosch in Vietnam, from 1st July 2014 on all business entities were merged into Bosch Vietnam Co. Ltd. with its head office at Ho Chi Minh City plant (HcP) in Dong Nai Province.\n\nHcP has started its belt assembly in a rented building on 1st August 2008 as the assembly plant of Tilburg Plant (TbP). On 14th April 2011, HcP celebrated the inauguration of the new plant (Lth101 with 17,000 sqm), which did not only allow to increase the production depth, but also to facilitate the push belt assembly of this high-tech product. On 3rd July 2012 HcP marked a big milestone by starting to produce the second component (loop-set) for its push belt. Since November 2012, HcP doubled the production floor space and increase the net total floor space up to 56.000 m², and have successfully increased its production capacity and realized a lot of new find opportunities to develop your expertise and broaden your tertiary studies. A strong support network will smooth your entry into working life: your supervisor and other team members will be there to help you succeed!\n\nTo be considered for our Student Program, you are required to meet the following criteria:\nYou must be currently enrolled in an undergraduate degree, with at least 12 months of study remaining, and have already completed at least one year of a Marketing or Data Analytics Undergraduate degree.\nEffective communication skills, both written and verbal including a strong focus on customer and stakeholder relationships\nExcellent attention to detail, be able to prioritise multiple tasks, work well within a team.\nAbility to interact with multiple stakeholders, including senior team members, while also working effectively individually\nProficiency in Microsoft Office Suite and Power BI\nStrong computer, data analysis and presentation skills\nHave a strong interest in innovation and open to opportunities to combine your studies with on-the-job learning\nDesirable\nExperience using SAP\nExperience using Adobe InDesign and Photoshop\n\nUndergraduate Program Benefits Include: \n12 month paid placements with potential for further opportunities to extend\nFlexibility around your study commitments or alternatively we welcome you full-time\nParticipation in our Students@Bosch Program, which includes work and social activities, which are designed to encourage and support your career\nOpportunities to develop and grow your skills in tandem with your tertiary studies within a multinational corporate environment\nWork on exciting projects that push the boundaries of technology\nCross functional opportunities\nA diverse and broad student placement\nFormalised training and ongoing support as introduction into the workplace\nIf you are an enthusiastic, energetic person who is passionate about working for an organisation where you can grow, develop and put your studi y of life all across the globe. Welcome to Bosch.\n\nBe responsible for Product Purchasing for all Product Group(s) along the complete product Life Cycle. (incl. product relocation)\nBe responsible for Product Purchasing Strategy implementation, Product Quality and Target Cost responsibility and accountability for related Product Group(s).\nAs BU contact interface to Material Field Purchasing (Commercial, Quality, Logistics) / Assure aligned messages from BU to the Material Field Purchasing.\nEscalation management in the BU for Purchasing related issues (commercial, quality, logistics).\n负责全产品生命周期内所有产品组的产品采购工作（含产品转移）。\n负责相关产品组的产品采购策略落地、产品质量及目标成本管控。\n作为事业部（BU）与物料采购团队（商务、质量、物流）的对接窗口，确保事业部向现场采购传递信息保持一致。\n负责事业部内采购相关问题（商务、质量、物流）的升级处理与管理。\n\nBachelor degree or above in technical engineering related majors, industry engineering, logistics/supply chain management, etc.\nGood command of English, both speaking & writing.\nFeatures team spirit and good at cross-functional collaboration.\nStrong problem analyzing and solving skills.\nProactive, down to earth, open-minded.\n本科及以上学历，工程技术相关专业、工业工程、物流 / 供应链管理等专业。\n英语听说读写能力良好。\n具备团队合作精神，擅长跨部门协作。\n较强的问题分析与解决能力。\n积极主动、踏实务实、思想开放。\n \n博世集团网上招聘数据处理同意声明 \n个人信息及目的：你的如下个人信息将被处理并用于招聘：姓名、电子邮箱、电话号码、所在地区、经验和教育信息、简历等应聘者自主提交的附件信息、证件号、职位、部门、计划入职日期、劳动合同持续时间、工作地点、月薪、年薪、浮动奖金比例、餐贴、车贴。 博世将依据相关的数据保护法规，在全球范围内对您的数据进行保密。招聘流程中，您的个人信息只有在必须时才会被提供给博世以外的第三方机构(如代理机构)。博世精心挑选了第三方机构并与之签订了保密合同。博世采取了种种保密措施以保护您的数据，确保其不会遭受操纵、丢失、破坏、未经授权的访问或泄漏。我们的安全措施将随着新技术的应用而不断升级。您的本地浏览器和我们的人才招募系统之间的数据传输通过https加密。 特定职位申请：申请博世集团的职位就意味着您将自己的个人信息提供给博世集团旗下相应的法律实体（具体请见博世集团法人清单）。请注意，若有任何文件或资料变更，请在所有申请书里一并变更。人力资源部门的员工可能与您联系，询问您是否同意将您的求职申请转向博世集团内部另一合适职位。如果您申请了特定职位，那么只有在您同意的情况下，博世才会将您的求职申请转向另一职位。 您可以随时撤回求职申请，博世将根据相关法律删除您的个人信息。与您的申请相关的所有资料将被保留至24个月。您的权利：若您希望停止向博世提供您的个人信息，可联系我们或通过博世网上招聘数据隐私声明中的BKMS系统提出申请。您可以在SmartRecruiters平台查阅和修改您的简历。您对您的个人信息的处理享有知情权、决定权，您有权限制或者拒绝我们对您的个人信息进行处理。您还可以更正、补充您的个人信息。 跨境传输：为了实现前述目的，我们所收集的您的个人信息可能会在多个国家或地区间进行跨境转移，例如德国、新加坡。 德国：罗伯特-博世有限公司（德国格宁根市罗伯特博世广场1号（Robert-Bosch-Platz 1, Gerlingen-Schillerhohe, Germany，邮编：70839），用于集团统一招聘管理（博世中国与数据接收方均基于该目的开展数据出境活动； 英国：SmartRecruiters（英国伯克郡温莎亚瑟路圣斯蒂芬大厦 邮政区码: SL4 1RU），用于招聘、后期交流联系及分享职位/活动信息、潜在人才社区邀请。 您可通过上述联系方式依法向境外接收方行使您在个人信息处理活动中的权利。 存储您的个人信息：我们将仅在为实现目的必要的范围内以及法律法规要求的时间内保留您的个人信息。 雇佣：被雇佣后，您提供的数据将被从当前招聘系统转移至职位所属公司的人力资源管理系统。联系方式： 请通过访问博世中国官方主页：博世在中国＞加入博世＞工作机会，在网上招聘数据隐私声明中“9.联系方式” 博世集团法人清单： 请通过访问博世中国官方主页：博世在中国＞加入博世＞工作机会，在网上招聘数据隐私声明中获取现阶段使用网上招聘系统的博世集团法人（第五页）", "resume_html": "", "cover_html": ""}, {"id": "265d78003cf7b378", "company": "Bosch", "title": "INGENIERO DE SISTEMAS DE CALIDAD", "location": "Celaya Planta, mx", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131550319-ingeniero-de-sistemas-de-calidad?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-11T00:03:24.973Z", "age_days": 0, "jd": "Bosch fue fundada en Stuttgart en 1886 por Robert Bosch (1861-1942), y por más de 130 años se ha distinguido por una cultura corporativa única, basada en valores sólidos que nos impulsan a mejorar cada día. Nuestros productos, presentes en una amplia variedad de terrenos, contribuyen a mejorar la calidad de vida de millones de personas.\n\nComo Sistemas de Calidad: Administrar y dar seguimiento a los procesos, documentación, auditorías e indicadores del Sistema de Gestión de la Calidad, asegurando el cumplimiento de los requisitos normativos y la correcta ejecución de los procedimientos establecidos.\n\nComo moderador de AMEF y Plan de control: Facilitar y documentar las sesiones de AMEF de diseño y/o proceso, asegurando la correcta identificación de riesgos, la definición de acciones preventivas y la coherencia técnica con el Plan de Control, manteniendo la trazabilidad entre riesgos identificados, controles establecidos y evidencias operativas.\n\nExperiencia de 3 años en  la posición o similar\nCertificado en VDA 6.3 e IATF\nCore Tools\nReducción de no conformidades\nEnfoque a resultados\nAuditor interno IATF certificado por entidad oficial  \nVDA 6.3 2023 certificado acreditado por VW \n\nInglés B2 Avanzado, capaz de establecer conversaciones \nAplicar estándares\nAuditoría de sistemas y procesos\nMedios digitales\nControl de calidad\nAnálisis de procesos\nResponsabilidad\nSolución de problemas (resolución de problemas)\nAnálisis del riesgo\nOrientación a objetivos\n Pensamiento analítico\nConocimiento de los estándares VDA 6.3, CQI-8, ISO 9001 e IATF 16949\nCompetencia en los Coretools automovilísticos\nAnálisis estadísticos\nIngenieria Mecánica, Ingenieria Industrial, Ingenieria Mecátronica, Ingenieria Electrónica, afines\nAlgunas de tus actividades:\n\nParticipar en actividades relacionadas a Producto y Proceso, 5S’s, ESD, Básicos de Calidad, LL (Lecciones aprendidas), BPS.\n\nLiderear herramientas de calidad como Básicos de calidad, Quality first, Lecciones aprendidas, LP\nPlanear, elaborar, actualizar, controlar y publicar la documentación del Sistema de Calidad\n\nParticipar en la Generación de reportes de los diferentes indicadores del área\n\nAuditar procesos y dar soporte en las auditorias definidas en el sistema de calidad.\n\nAsegurar la implementación y garantizar el cumplimiento de las normas IATF16949, ISO9001, los requisitos del cliente, del sistema Bosch y de las partes interesadas.\n\nRealizar la gestión de los procesos documentales relacionados con el sistema de calidad.\nRealizar confirmaciones del proceso FMEA y del plan de control (linewalks, Stand@Station, etc.).\n\nGarantizar la implementación del proceso de acciones recomendadas. Realizar el seguimiento, la supervisión, la escalada, etc. de las acciones definidas en el PFMEA.\n\nDefinir métodos, estandarizar prácticas y procesos en la planta CeaP.\n\nRealizar moderaciones del FMEA y del plan de control, para nuevos proyectos y producción en serie, de acuerdo con la metodología y los plazos establecidos\n\nBosch amplía constantemente su presencia internacional, ya que para nosotros la diversidad cultural representa una de nuestras mayores fuerzas. Impulsamos continuamente el crecimiento de nuestros más de 17 mil asociados, quienes desarrollan todo su potencial en una de las empresas con más alta calidad en materia de tecnología. Valoramos el balance entre vida personal y laboral como una de las principales herramientas para mejorar la creatividad y productividad de nuestros asociados.", "resume_html": "", "cover_html": ""}, {"id": "caf06b5207410a17", "company": "Bosch", "title": "Department Coordinator", "location": "Clayton, au", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131545559-department-coordinator?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-10T22:25:58.376Z", "age_days": 1, "jd": "With a proud history dating back 140 years, the Bosch Group now employs over 413,000 people across 60 countries incorporating 150 nationalities. As a leading IoT company, Bosch offers innovative solutions for smart homes, smart cities, connected mobility, and connected manufacturing. The Bosch Group’s strategic objective is to facilitate connected living and innovations for a connected life. Bosch improves quality of life worldwide with products and services that are innovative and spark enthusiasm. In short, Bosch creates technology that is “Invented for life.” To this day, Bosch remains privately owned, with 94% held by a charitable trust. Bosch is a rather special company. With its more than 470 locations worldwide, the Bosch Group has been carbon neutral overall (scopes 1 & 2 of the Greenhouse Gas Protocol Corporate Accounting and Reporting Standard) since 2020. This is achieved with four levers: improving energy efficiency, generating energy from renewable sources, purchasing green electricity, and offsetting residual CO₂ emissions with carbon credits. Visit sustainability.bosch.com for further information on the Bosch Group’s sustainability strategy.\nOur Bosch Australia Manufacturing Solutions (BAMS) department is a leader in the design and development of special purpose equipment and machinery. We combine a passion for solving complex engineering challenges with unmatched expertise in supporting the manufacture of a wide and diverse industry base with our purpose-built machines. We are passionate as we strive for success within our experienced and highly skilled team. Due to the nature of position, some local and interstate travel may be required.\nBosch is an equal opportunity employer. We celebrate diversity and encourage applicants of all backgrounds.\n\nFixed-Term Contract (12 Months) | Part-Time – 3 Days Per Week | Clayton, VIC\nWe are seeking a highly organised and proactive Department Coordinator to provide essential administrative and operational support to our BAMS Department. This is an excellent opportunity for an experienced administrator who enjoys variety, thrives in a fast-paced environment, and takes pride in keeping teams organised, efficient, and well-supported.\nBased on site at our Clayton Headquarters, you will work closely with managers, team leaders, project teams, and key stakeholders to ensure the smooth day-to-day operation of departmental administration activities.\nAs the central administrative support resource for the department, you will play a key role in coordinating office operations, supporting purchasing and invoicing processes, organising travel and meetings, and assisting with compliance and on-boarding activities.\nKey Responsibilities\nProvide administrative support to Department Managers, Team Leaders, and project teams\nCoordinate and manage departmental travel bookings, itineraries, and associated logistics\nSupport procurement activities, including purchasing, labour and material invoicing, and associated documentation\nAssist with BonaPARTE purchasing processes and PM7 invoicing workflows\nMonitor and support the efficient processing of invoices and purchasing activities\nCoordinate meetings, events, visitor arrangements, and departmental functions\nPrepare presentations, reports, correspondence, and other business documentation\nSupport compliance and documentation activities across the department\nAssist with on-boarding activities for new employees\nMaintain accurate records, databases, and departmental documentation\nProvide general office administration support including meeting coordination, minute taking, scanning, filing, and document management\nIdentify and support opportunities for process improvement and administrative efficiencies\n\nYou are an experienced administrator with excellent organisational skills, strong attention to detail, and the ability to build effective working relationships across a broad stakeholder group.\nTo be successful in this role, you will have:\nPrevious experience in an Office Administrator, Department Coordinator, Team Coordinator, or similar role\nAdvanced Microsoft Office skills, particularly Word, Excel, PowerPoint, Outlook, and Teams\nExceptional organisational and time management skills with the ability to manage multiple priorities\nStrong interpersonal, communication, and stakeholder management skills\nExperience coordinating meetings, events, visitors, travel, and office support activities\nA proactive and solutions-focused approach with strong attention to detail\nThe ability to work independently while contributing positively to a team environment\nStrong work ethic, professionalism, and commitment to delivering high-quality support\nDesirable\nExperience using SAP and associated business systems\nExposure to purchasing, procurement, invoicing, or finance administration processes\nExperience supporting engineering, manufacturing, technical, or project-based teams\nWhat We Offer\nFixed-Term 12-month contract with a respected global organisation\nPart-time opportunity (3 days per week)\nDiverse and varied role with broad stakeholder exposure\nSupportive and collaborative team environment\nModern facilities located at our Clayton Headquarters\nIf you are a highly organised administrator who enjoys supporting people, improving processes, and helping teams operate efficiently, we would love to hear from you.\n\nWe recognise that our employees are our greatest asset. Through the diversity of our business and commitment to personal and career development, we can provide you with new and exciting opportunities so you can achieve your full potential!\nWe offer our employees:\nThe ability to work flexibly\nTraining and development programs to help you reach your full potential\n14 weeks paid (or 28 weeks at half-pay) Parental Leave for primary carer (in addition to government paid parental leave)\nSuperannuation on unpaid Parental Leave\nThe option to purchase additional annual leave\nA wide range of Health and Well-being programs\nSupport and counselling services with work or personal matters through our Employee Assistance Program\nUp to 50 weeks Income Protection for permanent employees\nDiverse and exciting career opportunities, both local and international\nDiscounts on Bosch products and as well as products from affiliated brands\nYour application \nWe are committed to building a sustainable, inclusive, and diverse workforce in all its forms.  We value diversity in our organisation and in our recruitment activities and believe that every voice adds value. We actively pursue a recruiting strategy that works towards eliminating unconscious bias. To apply, please submit your cover letter and resume through the online application link.\nPlease note: You need to be an Australian citizen, or hold Australian work rights, to apply for this role.\nBosch does not accept any agency submissions unless approval has been given by a member of the Bosch HR Team. All agency submissions must be submitted directly to Bosch HR. Potential candidates submitted by an agency directly to any Bosch employee or manager without Bosch HR approval will not be considered by Bosch. Bosch will not be liable for a recruitment fee in these circumstances. Any agency terms and conditions must be signed by Bosch HR indicating acceptance.", "resume_html": "", "cover_html": ""}, {"id": "649650043f1c86fe", "company": "Bosch", "title": "Comprador Regional de Materiales", "location": "Mexicali, mx", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131545119-comprador-regional-de-materiales-?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-10T22:14:09.402Z", "age_days": 1, "jd": "Bosch fue fundada en Stuttgart en 1886 por Robert Bosch (1861-1942), y por más de 130 años se ha distinguido por una cultura corporativa única, basada en valores sólidos que nos impulsan a mejorar cada día. Nuestros productos, presentes en una amplia variedad de terrenos, contribuyen a mejorar la calidad de vida de millones de personas.\n\nBrindar soporte estratégico y administrativo para las compras de material directo a nivel nacional o regional de acuerdo con los lineamientos corporativos. Responsable de negociación, selección de proveedores y ahorros de acuerdo a las metas anuales.\n\nEscolaridad: Ingenieria Industrial, Ing. Mecanica, Administracion o similar\nExperiencia laboral: 3 años de experiencia en trabajos similares\nHabilidades:\nConocimiento de procesos de Manufactura (Moldeo / Casting / Maquinados / Empaque)\nHabilidad de comunicacion (Inglés avanzado)\nExperiencia en desarrollo de estrategia de compra local / global\nExperiencia Global en manejo de proveeduria\nExperiencia en Negociaciones / Contratos\nExperiencia en Desarrollo de Proveedores\nExperiencia en Localizacion de compras\nConocimiento Intermedio T&C de Compras\nManejo de Paquetería Office / SAP\nExperiencia intermedia en Project Management\nTrabajo en equipo local / global.\nAutodirigido\nProactivo\n\nBosch amplía constantemente su presencia internacional, ya que para nosotros la diversidad cultural representa una de nuestras mayores fuerzas. Impulsamos continuamente el crecimiento de nuestros más de 17 mil asociados, quienes desarrollan todo su potencial en una de las empresas con más alta calidad en materia de tecnología. Valoramos el balance entre vida personal y laboral como una de las principales herramientas para mejorar la creatividad y productividad de nuestros asociados.", "resume_html": "", "cover_html": ""}, {"id": "39d442b4018d3745", "company": "Bosch", "title": "Proyect Buyer", "location": "Mexicali, mx", "url": "https://jobs.smartrecruiters.com/BoschGroup/744000131545059-proyect-buyer?oga=true", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-10T22:13:09.944Z", "age_days": 1, "jd": "Bosch fue fundada en Stuttgart en 1886 por Robert Bosch (1861-1942), y por más de 130 años se ha distinguido por una cultura corporativa única, basada en valores sólidos que nos impulsan a mejorar cada día. Nuestros productos, presentes en una amplia variedad de terrenos, contribuyen a mejorar la calidad de vida de millones de personas.\n\nProject Buyer is responsible to manage products in the regional business unit during life cycle. Ensures and controls the implementation of projects to achieve cost, quality and delivery within the business unit.\nMain activities:\nProject Purchasing Administrator\nSearch and implement cost reduction ideas, localization projects and engineering improvements, coordinating efforts within other functions such as engineering, quality, manufacturing and logistics.\nProduct line buyer is the main contact between business unit and commercial purchasing to secure a reliable supply chain.\n\nBachelors degree in Engineering, administration or related fields.\nMin. 3 year experience in similar position (Project Managment)\nProject Management Skills\nManufacturing Process understanding (Stamping, Turning, Plastic Injection)\nBasic Quality concepts (Cpk, Tolerances, measurements)\nCommunication Skills (Advanced English) Mandatory\nGlobal experience with overseas suppliers.\nMicrosoft Office knowledge, SAP (desirable).\nNegotiation Skills (desirable)\nTeamwork\nSelf di const sel = {approve:new Set(), reject:new Set()};
const scoreColor = s => s>=85?'#0b6e4f':s>=70?'#2563eb':s>=50?'#b45309':'#94a3b8';
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function renderCards(){
  const order=['discovered','scored','approved','docs_ready','prefilled','applied'];
  let total=Object.values(COUNTS).reduce((a,b)=>a+b,0);
  let h=`<div class="card"><div class="n">${total}</div><div class="l">total</div></div>`;
  order.forEach(k=>{if(COUNTS[k])h+=`<div class="card"><div class="n">${COUNTS[k]}</div><div class="l">${k.replace('_',' ')}</div></div>`});
  document.getElementById('cards').innerHTML=h;
}
function filtered(){
  const q=document.getElementById('q').value.toLowerCase();
  const ms=+document.getElementById('minScore').value||0;
  const sec=document.getElementById('sector').value;
  const phd=document.getElementById('phd').checked;
  return JOBS.filter(j=>{
    const sj=j.score_json||{};
    if(q && !((j.company+' '+j.title).toLowerCase().includes(q))) return false;
    if((j.score||0)<ms) return false;
    if(sec && sj.sector!==sec) return false;
    if(phd && !sj.is_phd) return false;
    return true;
  });
}
function card(j){
  const sj=j.score_json||{};
  let tags='';
  if(sj.sector)tags+=`<span class="tag sector">${esc(sj.sector)}</span>`;
  if(sj.is_phd)tags+='<span class="tag phd">PhD</span>';
  if(sj.german_required)tags+=`<span class="tag de">German ${esc(sj.german_required)}</span>`;
  if(sj.tier)tags+=`<span class="tag">tier ${esc(sj.tier)}</span>`;
  if(j.age_days!=null)tags+=`<span class="tag" style="background:#dcfce7;color:#166534">${j.age_days<=0?'today':j.age_days+'d ago'}</span>`;
  else tags+='<span class="tag" style="background:#fef9c3;color:#854d0e">date?</span>';
  if(sj.link_ok===false)tags+='<span class="tag" style="background:#fee2e2;color:#991b1b">⚠ link dead</span>';
  const reasons=(sj.reasons||[]).slice(0,4).map(r=>`<li>${esc(r)}</li>`).join('');
  const docs=(j.resume_html||j.cover_html)?`<button class="blue" onclick="openJob('${j.id}')">View docs &amp; JD</button>`:`<button class="ghost" onclick="openJob('${j.id}')">View JD</button>`;
  return `<div class="job"><div class="badge" style="background:${scoreColor(j.score)}">${j.score??'—'}</div>
   <div class="jobmain"><h3>${esc(j.title)}</h3>
   <div class="co">${esc(j.company)} · ${esc(j.location||'n/a')} <span class="pill" style="background:#64748b">${j.state}</span></div>
   <div class="tags">${tags}</div><ul class="reasons">${reasons}</ul>
   <div style="display:flex;gap:8px;flex-wrap:wrap">
     <a href="${esc(j.url||'#')}" target="_blank"><button class="ghost">Open posting ↗</button></a>
     ${docs}
     <button class="ok" onclick="pick('approve','${j.id}')">✓ Approve</button>
     <button class="no" onclick="pick('reject','${j.id}')">✕ Reject</button>
   </div></div></div>`;
}
function render(){
  const f=filtered();
  document.getElementById('qhead').textContent=`Review queue · ${f.length} shown`;
  document.getElementById('list').innerHTML=f.map(card).join('')||'<p style="color:#64748b">No matches.</p>';
}
let curDoc='jd';
function openJob(id){
  const j=JOBS.find(x=>x.id===id); curDoc='jd';
  document.getElementById('m_title').textContent=j.title;
  document.getElementById('m_co').textContent=j.company+' · '+(j.location||'');
  document.getElementById('m_url').href=j.url||'#';
  let tabs=`<button class="tabbtn active" onclick="showDoc('${id}','jd',this)">Job description</button>`;
  if(j.resume_html)tabs+=`<button class="tabbtn" onclick="showDoc('${id}','resume',this)">Résumé</button>`;
  if(j.cover_html)tabs+=`<button class="tabbtn" onclick="showDoc('${id}','cover',this)">Cover letter</button>`;
  document.getElementById('m_tabs').innerHTML=tabs;
  showDoc(id,'jd',document.querySelector('#m_tabs .tabbtn'));
  document.getElementById('modal').showModal();
}
function showDoc(id,which,btn){
  document.querySelectorAll('#m_tabs .tabbtn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const j=JOBS.find(x=>x.id===id);
  const body=document.getElementById('m_body');
  if(which==='jd'){body.innerHTML=`<pre class="jd">${esc(j.jd)||'(no JD captured)'}</pre>`;}
  else{const html=which==='resume'?j.resume_html:j.cover_html;
    const ifr=document.createElement('iframe');ifr.srcdoc=html;body.innerHTML='';body.appendChild(ifr);}
}
function pick(kind,id){
  sel[kind].add(id); sel[kind==='approve'?'reject':'approve'].delete(id); updateBar();
}
function updateBar(){
  const a=[...sel.approve], r=[...sel.reject];
  document.getElementById('cmd_approve').textContent='python -m jobauto approve '+(a.join(' ')||'—');
  document.getElementById('cmd_reject').textContent='python -m jobauto reject '+(r.join(' ')||'—');
  document.getElementById('cmdbar').style.display=(a.length||r.length)?'flex':'none';
}
function copyCmds(){
  const a=[...sel.approve], r=[...sel.reject]; let lines=[];
  if(a.length)lines.push('python -m jobauto approve '+a.join(' '));
  if(r.length)lines.push('python -m jobauto reject '+r.join(' '));
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('Copied:\n'+lines.join('\n')));
}
function clearSel(){sel.approve.clear();sel.reject.clear();updateBar();}
['q','minScore','sector','phd'].forEach(id=>document.getElementById(id).addEventListener('input',render));
renderCards(); render();
</script></body></html>

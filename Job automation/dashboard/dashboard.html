hnen die Flexibilität, die Sie sich für Ihre Arbeit wünschen.\n\n\\- Wer auf die Arbeit im Büro setzt: An unseren internationalen Standorten stellen wir modernstes Equipment sowie Ruhe\\- und Gemeinschaftsräume für jede Situation bereit.  \n\n* Für einen potenziellen Umzug in die Nähe des Büros unterstützen wir Sie organisatorisch und finanziell – auch international.\n* Bei der Einarbeitung steht Ihnen Ihr persönlicher Business Buddy zur Seite – so lernen New Starter das Unternehmen, den Fachbereich und die Kolleg:innen schnell kennen.\n* Wem das nicht reicht: Mit der Arbeit an grünen Wasserstofftechnologien sorgen wir für saubere Energie der Zukunft. Seien Sie ein Teil davon: **new era is you**.\n **Wir wertschätzen Vielfalt**  \n\nDaher begrüßen wir alle Bewerbungen – unabhängig von Geschlecht, Nationalität, ethnischer und Herkunft, Religion/Weltanschauung, Behinderung, Alter sowie sexueller Orientierung und Identität.\n\n  \n\nJob Reference: WW\\_DT\\_NUCERA00623", "resume_html": "", "cover_html": ""}, {"id": "cba0f5363b7ac7bf", "company": "greenwind Group", "title": "Abschlussarbeit BA/ MA mit Praxisbezug", "location": "Berlin, BE, DE", "url": "https://t.gohiring.com/h/5a9f000cac43b42298b8e00a4fd91cb3a174fa4b552fb4f533281529a776a6d4?source=Indeed", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-09", "age_days": 2, "jd": "#### **Deine Aufgaben**\n\nBewirb dich initiativ mit einer Themenidee für deine Bachelor\\- oder Masterarbeit bei uns! Die Arbeit kann in Deutsch oder in Englisch verfasst werden.  \n\nWir bieten dir eine Vergütung von 200€ Basis (netto) an mit einem optionalem Bonus.  \n\n  \n\nDie **greenwind Innovation** mit Sitz in Berlin ist ein auf innovative Energielösungen spezialisiertes Planungs\\- und Beratungsunternehmen und Teil der greenwind Group. Die Unternehmensgruppe ist seit 2008 erfolgreich in Deutschland, Dänemark und Schweden aktiv und beschäftigt heute über 140 Mitarbeitende. Als Kompetenzzentrum für die Entwicklung und Umsetzung integrierter Energiesysteme begleitet greenwind Innovation Projekte im Bereich Sektorenkopplung und kommunale Energieplanung stets in Kombination mit Erneuerbaren Energien – von der ersten Machbarkeitsanalyse bis hin zur konkreten Umsetzung. Schwerpunkte bei der Arbeit sind hier:\n\n  \n\n* Wärmewende: Von kommunalen Wärmeplänen als praxistaugliche, umsetzungsorientierte Planungsgrundlagen bis hin zur Machbarkeitsanalyse von Wärmenetzen und deren Umsetzung in Zusammenarbeit mit den Akteuren vor Ort\n* Batteriespeichersysteme (BESS): Planung und Entwicklung von Speichern zur Flexibilisierung, Netzentlastung und Systemstabilisierung erneuerbarer Energiesysteme im Co\\-Location unseren EE\\-Anlagen\n* Dezentrale Wasserstoff\\-Elektrolyse: Entwicklung und Integration von H₂\\-Projekten zur Sektorenkopplung, inkl. Nutzung erneuerbarer Überschüsse und Einbindung in lokale Wertschöpfungsketten.\n* Hybride Energieparks (PV \\& Wind): Konzeption, Auslegung, Entwicklung und Umsetzung kombinierter Erzeugungsstandorte, um die Systemeffizienz der Kombination umfangreich zu nutzen\n* Direktversorgung der Industrie: Gestaltung von Modellen zur langfristigen, erneuerbaren Stromversorgung energieintensiver Betriebe mit PPAs\n\nDas Team vereint Fachwissen aus den Bereichen Energietechnik, regenerative Energien, Geoinformationssysteme, Gebäudeeffizienz, Projektsteuerung und Moderation kommunaler Akteure. Ziel aller Aktivitäten ist es, technische, wirtschaftliche und gesellschaftliche Aspekte gleichermaßen zu verbinden, um die Energiewende erfolgreich und ganzheitlich umzusetzen.  \n\n  \n\nWenn dein Vorschlag passend zu sein scheint, dann los\\- schick uns deine **vollständigen Unterlagen**!  \n\nBitte füge eine Themenbeschreibung inkl. geplanter Quellen, angestrebter Forschungsfrage sowie eine Info zum vorgesehenen Lehrstuhl/ Professur an deiner Hochschule hinzu. Zudem benötigen wir bitte deinen Lebenslauf, den Studienverlaufsplan, ein Motivationsschreiben sowie html": "", "cover_html": ""}, {"id": "ff9f69819ccc04fd", "company": "Forschungszentrum Jülich", "title": "Doktorand:in - Projekt SynDiPET (w/m/d)", "location": "Jülich, North Rhine-Westphalia, Germany", "url": "https://www.linkedin.com/jobs/view/4427008409", "score": null, "state": "discovered", "score_json": {}, "posted_at": "2026-06-10", "age_days": 1, "jd": "Doktorand:in \\- Projekt SynDiPET (w/m/d)\n   \n\n  \n\n Das\n **IMD\\-2 – Werkstoffsynthese und Herstellungsverfahren** \n (ehemals IEK\\-1\\) erforscht und entwickelt Materialien, Bauteile und Komponenten für aktuelle und zukünftige hocheffiziente Energiewandlungs\\- und Speichersysteme. Dabei spielen Hochleistungskeramiken eine Schlüsselrolle. Die Forschungsfelder des IMD\\-2 sind: Werkstoffe für Hochtemperaturanwendungen (Wärmedämm\\- und Schutzschichten für Wasserstoff\\-Gasturbinen, \\-Fusionsanlagen und die Solarthermie), Gastrennmembranen für Wasserstoff und Sauerstoff, Sorbenzien für die direkte Entfernung von CO2 aus der Luft sowie katalytische Membranreaktoren für energieeffiziente Prozesse, Festoxid\\-Brennstoffzellen (SOFC) sowie Elektrolysezellen (SOEC) für die Erzeugung von H2 und CO und Beschichtungen für Niedertemperaturelektrolyseure, Lithium\\- und Natrium\\-Festkörperbatterien mit hoher Sicherheit und Stabilität für stationäre und mobile Anwendungen. Das Fachwissen der Forschenden, das von der Festkörperchemie und \\-synthese über die pulverbasierte und nasschemische Verarbeitung, das Sintern bis hin zu Dünnschicht\\- und thermischen Spritzverfahren reicht, ermöglicht eine schnelle Anpassung an die neuen wissenschaftlichen Herausforderungen. Die experimentellen Aktivitäten werden durch Multiskalenmodellierung (von DFT bis hin zur Fluiddynamik und Finite\\-Elemente\\-Analyse) ergänzt, was zu einem besseren Verständnis und einer besseren Vorhersage von Materialien und Prozessen führt.\n   \n\n  \n\n Für die Energiewende in Deutschland werden dringend effiziente Umwandlungs\\- und Speichertechnologien gebraucht. Eine zentrale Rolle nimmt dazu die Elektrolysetechnologie ein, welche die Umwandlung von überschüssiger elektrischer Energie in Wasserstoff ermöglicht. Protonenleitende Membranen spielen in zukünftigen Wasserstoffkonzepten eine Schlüsselrolle als Elektrolyt für protonenleitende keramische Elektrolyse\\- und Brennstoffzellen (PCEC/PCFC). Eine aussichtsreiche Materialklasse für protonenleitende Membranen sind Yttrium\\-dotierte Bariumzirkonate BaZrxY1\\-xO3\\-d (BZY) und Bariumceratzirkonate BaZrxCeyY1\\-x\\-yO3\\-d (BZCY). Die elektrochemischen Eigenschaften können durch gezielte Dotierung mit Elementen wie Y3\\+, Yb3\\+, Al3\\+, Sc3\\+ und In3\\+ weiter verbessert werden, da eine Erhöhung der Korngrenzenleitfähigkeit in Aussicht steht. Zum gegenwärtigen Zeitpunkt wird der Einfluss von Dotierungselementen auf die Protonenleitfähigkeit in den meisten Fällen durch Trial und Error\\-Verfahren untersucht und die gezielte Nutzung der Segregation von Akzeptordotierungselementen auf Korngrenzen steht noch am Anfang.\n   \n\n  \n\n Ihre Aufgaben im Team\n   \n\n  \n\n Als Teil der von der DFG geförderten Forschergruppe FOR5966 „Synergistic Design of Proton\\-Conducting Ceramics for Energy Technology“ SynDiPET, stellen Sie am Forschungszentrum Jülich am Institut für Energy Materials and Devices (IMD\\-2: Materials Synthesis and Processing) akzeptordotierte BZY und BZCY\\-Membranen ausgehend von selbst synthetisierten Pulvern mit Schnellsintermethoden her und charakterisieren diese grundlegend für eine Anwendung im Bereich PCEC/PCFC. In der Forschergruppe FOR5966 – bestehend aus der TU Darmstadt, Universität Stuttgart, Max\\-Planck\\-Institut Stuttgart, Universität Gießen, Karlsruher Institut für Technologie und Forschungszentrum Jülich – werden Photonisches Sintern als weitere Schnellsintermethode und tiefergehende Charakterisierungsmethoden angewandt. Ziel ist die Erstellung einer Prozess\\-Defekt\\-Mikrostruktur\\-Eigenschaften Datenbank, die es anderen Projektpartnern ermöglicht, ein datengesteuertes Konzept maschinellen Lernens zu entwickeln, das den Zusammenhang zwischen Sinterparametern und funktionellen Eigenschaften vorhersagt.\n   \n\n  \n\n* Pulversynthese und gezielte Dotierung von akzeptordotierten BZY\\- und BZCY\\-Pulvern über eine modifizierte Mixed\\-Oxide\\-Route\n* Sintern von Probekörpern durch ultraschnelles Hochtemperatursintern (Ultra\\-fast high temperature sintering UHS) und feldunterstütztes Sintern (Field assisted sintering technlogy/spark plasma sintering FAST/SPS)\n* Optimierung der beiden Sintermethoden und Etablierung einer automatisierten Datenerfassung\n* Grundlegende Charakterisierung der Mikrostruktur, Phasenzusammensetzung und Leitfähigkeit\n* Koordination der Charakterisierung von in Jülich hergestellten Proben bei den Projektpartnern\n* Erfassung der Daten mit eLabFTW und Übertrag in die zentrale Datenbank in Kadi4Mat\n\n Das bringen Sie mit\n   \n\n  \n\n* Erfolgreich abgeschlossenes Hochschulstudium (Master) im Bereich Physik, Maschinenbau, Verfahrenstechnik, Werkstoffwissenschaften oder ähnlichen Fachbereichen\n* Grundlegende Kenntnisse protonenleitender Werkstoffe und deren spezifischen Eigenschaften\n* Erfahrung im Bereich Synthese und Formgebung von keramischen Werkstoffen über die Pulverroute\n* Erfahrung in der Verdichtung der Pulver über feldunterstützte Sintermethoden (FAST/SPS)\n* Mikrostrukturcharakterisierung mittels SEM/EDX und Phasenanalyse mittels XRD\n* Grundkenntnisse Impedanzspektroskopie\n* Experimentelles Geschick und eigenständiges Arbeiten\n* Interesse in einer institutsübergreifenden, internationalen Forschergruppe zu arbeiten\n* Gute Beherrschung der englischen Sprache in Wort und Schrift\n* Ein hohes Maß an Teamfähigkeit und Flexibilität sowie die Bereitschaft zu großem Engagement\n\n Freuen Sie sich auf folgende Benefits\n   \n\n  \n\n Wir arbeiten an hochaktuellen gesellschaftlich relevanten Themen und bieten Ihnen die Möglichkeit, den Wandel aktiv mit const scoreColor = s => s>=85?'#0b6e4f':s>=70?'#2563eb':s>=50?'#b45309':'#94a3b8';
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function renderCards(){
  const order=['discovered','scored','approved','docs_ready','prefilled','applied'];
  let total=Object.values(COUNTS).reduce((a,b)=>a+b,0);
  let h=`<div class="card"><div class="n">${total}</div><div class="l">total</div></div>`;
  order.forEach(k=>{if(COUNTS[k])h+=`<div class="card"><div class="n">${COUNTS[k]}</div><div class="l">${k.replace('_',' ')}</div></div>`});
  document.getElementById('cards').innerHTML=h;
}
function filtered(){
  const q=document.getElementById('q').value.toLowerCase();
  const ms=+document.getElementById('minScore').value||0;
  const sec=document.getElementById('sector').value;
  const phd=document.getElementById('phd').checked;
  return JOBS.filter(j=>{
    const sj=j.score_json||{};
    if(q && !((j.company+' '+j.title).toLowerCase().includes(q))) return false;
    if((j.score||0)<ms) return false;
    if(sec && sj.sector!==sec) return false;
    if(phd && !sj.is_phd) return false;
    return true;
  });
}
function card(j){
  const sj=j.score_json||{};
  let tags='';
  if(sj.sector)tags+=`<span class="tag sector">${esc(sj.sector)}</span>`;
  if(sj.is_phd)tags+='<span class="tag phd">PhD</span>';
  if(sj.german_required)tags+=`<span class="tag de">German ${esc(sj.german_required)}</span>`;
  if(sj.tier)tags+=`<span class="tag">tier ${esc(sj.tier)}</span>`;
  if(j.age_days!=null)tags+=`<span class="tag" style="background:#dcfce7;color:#166534">${j.age_days<=0?'today':j.age_days+'d ago'}</span>`;
  else tags+='<span class="tag" style="background:#fef9c3;color:#854d0e">date?</span>';
  if(sj.link_ok===false)tags+='<span class="tag" style="background:#fee2e2;color:#991b1b">⚠ link dead</span>';
  const reasons=(sj.reasons||[]).slice(0,4).map(r=>`<li>${esc(r)}</li>`).join('');
  const docs=(j.resume_html||j.cover_html)?`<button class="blue" onclick="openJob('${j.id}')">View docs &amp; JD</button>`:`<button class="ghost" onclick="openJob('${j.id}')">View JD</button>`;
  return `<div class="job"><div class="badge" style="background:${scoreColor(j.score)}">${j.score??'—'}</div>
   <div class="jobmain"><h3>${esc(j.title)}</h3>
   <div class="co">${esc(j.company)} · ${esc(j.location||'n/a')} <span class="pill" style="background:#64748b">${j.state}</span></div>
   <div class="tags">${tags}</div><ul class="reasons">${reasons}</ul>
   <div style="display:flex;gap:8px;flex-wrap:wrap">
     <a href="${esc(j.url||'#')}" target="_blank"><button class="ghost">Open posting ↗</button></a>
     ${docs}
     <button class="ok" onclick="pick('approve','${j.id}')">✓ Approve</button>
     <button class="no" onclick="pick('reject','${j.id}')">✕ Reject</button>
   </div></div></div>`;
}
function render(){
  const f=filtered();
  document.getElementById('qhead').textContent=`Review queue · ${f.length} shown`;
  document.getElementById('list').innerHTML=f.map(card).join('')||'<p style="color:#64748b">No matches.</p>';
}
let curDoc='jd';
function openJob(id){
  const j=JOBS.find(x=>x.id===id); curDoc='jd';
  document.getElementById('m_title').textContent=j.title;
  document.getElementById('m_co').textContent=j.company+' · '+(j.location||'');
  document.getElementById('m_url').href=j.url||'#';
  let tabs=`<button class="tabbtn active" onclick="showDoc('${id}','jd',this)">Job description</button>`;
  if(j.resume_html)tabs+=`<button class="tabbtn" onclick="showDoc('${id}','resume',this)">Résumé</button>`;
  if(j.cover_html)tabs+=`<button class="tabbtn" onclick="showDoc('${id}','cover',this)">Cover letter</button>`;
  document.getElementById('m_tabs').innerHTML=tabs;
  showDoc(id,'jd',document.querySelector('#m_tabs .tabbtn'));
  document.getElementById('modal').showModal();
}
function showDoc(id,which,btn){
  document.querySelectorAll('#m_tabs .tabbtn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const j=JOBS.find(x=>x.id===id);
  const body=document.getElementById('m_body');
  if(which==='jd'){body.innerHTML=`<pre class="jd">${esc(j.jd)||'(no JD captured)'}</pre>`;}
  else{const html=which==='resume'?j.resume_html:j.cover_html;
    const ifr=document.createElement('iframe');ifr.srcdoc=html;body.innerHTML='';body.appendChild(ifr);}
}
function pick(kind,id){
  sel[kind].add(id); sel[kind==='approve'?'reject':'approve'].delete(id); updateBar();
}
function updateBar(){
  const a=[...sel.approve], r=[...sel.reject];
  document.getElementById('cmd_approve').textContent='python -m jobauto approve '+(a.join(' ')||'—');
  document.getElementById('cmd_reject').textContent='python -m jobauto reject '+(r.join(' ')||'—');
  document.getElementById('cmdbar').style.display=(a.length||r.length)?'flex':'none';
}
function copyCmds(){
  const a=[...sel.approve], r=[...sel.reject]; let lines=[];
  if(a.length)lines.push('python -m jobauto approve '+a.join(' '));
  if(r.length)lines.push('python -m jobauto reject '+r.join(' '));
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('Copied:\n'+lines.join('\n')));
}
function clearSel(){sel.approve.clear();sel.reject.clear();updateBar();}
['q','minScore','sector','phd'].forEach(id=>document.getElementById(id).addEventListener('input',render));
renderCards(); render();
</script></body></html>

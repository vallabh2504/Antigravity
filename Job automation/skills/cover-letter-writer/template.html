<!doctype html>
<!-- Cover-letter template. The application-writer fills {{...}}. Matches resume accent. -->
<html lang="en"><head><meta charset="utf-8">
<title>{{name}} — Cover Letter — {{company}}</title>
<style>
  :root{ --accent:#0b6e4f; --ink:#1a1a1a; --muted:#5b6470; --line:#e3e6ea; }
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
    max-width:760px;margin:24px auto;padding:0 32px;line-height:1.55;font-size:14px}
  .sender{font-size:13px;color:var(--muted);text-align:right}
  .sender b{color:var(--ink);font-size:15px}
  .accent{height:3px;background:var(--accent);margin:14px 0 18px;border:0}
  .recipient{margin:0 0 4px} .date{color:var(--muted);font-size:13px;margin:0 0 16px}
  .subject{font-weight:600;color:var(--accent);margin:0 0 14px}
  p{margin:0 0 12px} .sign{margin-top:18px}
  @media print{ body{margin:0;max-width:none;font-size:12px} }
</style></head><body>
  <div class="sender"><b>{{name}}</b><br>{{location}}<br>{{email}}<br>{{links}}</div>
  <hr class="accent">
  <div class="recipient">{{company}}<br><span style="color:#5b6470">{{company_location}}</span></div>
  <div class="date">{{date}}</div>
  <div class="subject">Re: {{role_title}}</div>

  <p>{{greeting}}</p>
  {{body_paragraphs}}
  <div class="sign">{{closing}}<br><br><b>{{name}}</b></div>
</body></html>

# Pipeline configuration.

# FRESHNESS: only surface postings posted within this many days (the "last 3 days"
# requirement). Sources are queried with this window; the digest also filters by it.
max_age_days: 3
# strict: a posting with NO verifiable date is DROPPED (it cannot be proven to be fresh).
# This is what stops undated / re-surfaced LinkedIn postings from March/April slipping in.
strict_freshness: true

# Stage 1a — JobSpy: the open-source, NO-KEY volume/freshness backbone. Scrapes
# LinkedIn/Indeed/Google for Jobs/Glassdoor directly (replaces the paid JSearch route).
# Each search_term x location is one scrape; hours_old is derived from max_age_days.
jobspy:
  enabled: true
  # Indeed + Google for Jobs only. They return the REAL employer/ATS apply URL (job_url_direct),
  # which we can fetch to verify the true posting date. LinkedIn is dropped: its links bot-wall
  # our date checker AND it re-surfaces months-old roles as "fresh" (the BMW 18.03 case).
  # Glassdoor dropped too (403s datacenter IPs every run).
  sites: [indeed, google]
  search_terms:
    - "fuel cell engineer"
    - "hydrogen engineer"
    - "Brennstoffzelle"
    - "Wasserstoff Ingenieur"
  locations:
    - "Stuttgart, Germany"
    - "Germany"
  results_wanted: 40
  country_indeed: Germany

# Stage 1b — discovery breadth: aggregator/PhD APIs that return a POSTED DATE and a
# canonical APPLY LINK (so links work and we can filter to the last N days).
aggregators:
  # JSearch (paid RapidAPI) — DROPPED in favour of JobSpy. Left disabled in case you
  # ever want to re-enable it (set the RAPIDAPI_KEY secret + enabled: true).
  jsearch: { enabled: false, query: "fuel cell OR hydrogen engineer Germany", country: de }
  adzuna: { enabled: false, country: de, what: "fuel cell hydrogen", where: "" }   # needs free keys
  arbeitnow: { enabled: true, query: "fuel cell hydrogen" }          # no auth, DE-heavy
  # German federal index (real dates; covers ZSW/DLR/Fraunhofer/Bosch). One keyword per
  # request, swept; the prefilter narrows. This is our institute/company "adapter".
  bundesagentur: { enabled: true, queries: ["Brennstoffzelle", "Wasserstoff Ingenieur", "fuel cell"], where: "" }
  euraxess: { enabled: true, query: "fuel cell hydrogen" }           # EU-wide PhD/research, HTML

# Stage 3 — hard rules (cheap prefilter before LLM scoring)
include_keywords:
  - fuel cell
  - fuel-cell
  - hydrogen
  - wasserstoff
  - brennstoffzelle
  - FCEV
  - PEM
  - electrolyzer
  - elektrolyse
  - hydrogen storage
  - fuel cell stack   # not bare "stack" — that matches "tech stack" in unrelated SW roles
  - balance of plant
  - SOFC
  - SOEC
exclude_keywords:
  - sales representative
  - internship   # remove if you also want working-student/intern roles
  - praktikum

# Geography preference (Stuttgart > Germany > Europe). Empty location = kept.
locations:
  - stuttgart
  - baden-württemberg
  - germany
  - deutschland
  - münchen
  - munich
  - europe
  - remote

# Stage 4/7 — reporting
report:
  top_n: 15
  min_score: 50        # only surface jobs scoring >= this in the digest

# Stage 7 — delivery (used by OpenClaw; in-container we just write the report file)
delivery:
  gmail: { enabled: true, to: "saibharadhwajreddy@gmail.com", mode: draft }  # draft | send
  messaging: { enabled: false, channel: telegram }   # set true once OpenClaw channel is wired
  commit_report: true   # commit reports/YYYY-MM-DD.md to git each run

# Candidate quick-facts the agent may use in cover letters (non-secret)
candidate:
  visa_status: "International student in Germany (verify Blue Card / job-seeker timeline)"
  earliest_start: "see profile.md (~6-12 months)"
  german_level: "A2-B1"
